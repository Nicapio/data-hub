<script>
const S=document.getElementById('status'), F=document.getElementById('f');
let booted=false, pending=null;
function html(){
  const h=document.getElementById('labB64').textContent.trim();
  const bytes=Uint8Array.from(atob(h),c=>c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}
F.addEventListener('load',()=>S.textContent='iframe load event fired');
F.addEventListener('error',()=>S.textContent='iframe ERROR event');
try{
  const url=URL.createObjectURL(new Blob([html()],{type:'text/html'}));
  F.src=url;
  S.textContent='blob src set ('+html().length+' chars)';
}catch(e){ S.textContent='blob failed: '+e.message; }

window.addEventListener('message',ev=>{
  const m=ev.data; if(!m||!m.type)return;
  if(m.type==='DATAHUB_LAB_BOOTED'){ booted=true; S.textContent='✓ Lab BOOTED (handshake works!)';
    if(pending){F.contentWindow.postMessage(pending,'*');pending=null;} }
  if(m.type==='DATAHUB_LAB_READY'){ S.textContent='✓ Lab ran backtest on '+m.bars+' bars'; }
});
function sendTest(){
  const bars=[];let p=100;
  for(let i=0;i<80;i++){const o=p,c=p*(1+Math.sin(i/7)*0.013+0.0015);
    bars.push({open:o,high:Math.max(o,c)*1.012,low:Math.min(o,c)*0.988,close:c,volume:1e6});p=c;}
  const payload={type:'DATAHUB_LOAD_BARS',bars,label:'TEST 80'};
  if(booted){F.contentWindow.postMessage(payload,'*');}else{pending=payload;S.textContent='queued (waiting for boot)';}
}
</script>
</body></html>
